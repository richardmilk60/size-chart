<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Size Comparison Visualizer</title>
<style>
:root{--bg:#090d12;--surface:#0f1822;--border:#1c2a38;--text:#7a95ae;--bright:#bdd0e0;--accent:#2563a8}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Courier New',monospace;font-size:12px;min-height:100vh}
header{padding:18px 28px 14px;border-bottom:1px solid var(--border);display:flex;align-items:baseline;gap:18px}
header h1{font-size:13px;font-weight:normal;letter-spacing:.14em;text-transform:uppercase;color:var(--bright)}
header .sub{font-size:10px;opacity:.45;letter-spacing:.06em}
.tabs{display:flex;border-bottom:1px solid var(--border);padding:0 28px}
.tab{padding:11px 20px;cursor:pointer;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text);border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .2s,border-color .2s;user-select:none}
.tab.active{color:var(--bright);border-bottom-color:var(--accent)}
.tab:hover:not(.active){color:var(--bright)}
.pane{display:none;padding:28px}
.pane.active{display:block}
.slider-row{display:flex;align-items:center;gap:10px;margin-bottom:22px}
.state-btn{padding:4px 13px;background:none;border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:10px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .2s;white-space:nowrap}
.state-btn:hover,.state-btn.on{border-color:var(--accent);color:var(--bright)}
.state-btn.photo-btn.on{border-color:#6080a0;color:#a0b8c8}
input[type=range]{-webkit-appearance:none;flex:1;height:2px;background:var(--border);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:var(--accent);border:2px solid var(--bg);cursor:pointer}
.chart-scroll{overflow-x:auto;padding-bottom:6px}
.p-name{display:block;font-size:10px;font-weight:bold;letter-spacing:.08em;text-transform:uppercase}
.p-meas{display:block;font-size:8.5px;color:#888;margin-top:2px}
.chart-note{font-size:10px;opacity:.45;margin-top:12px;line-height:1.65}
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;margin-top:22px}
.stat-card{background:var(--surface);border:1px solid var(--border);padding:13px 16px}
.stat-card .lbl{font-size:9px;letter-spacing:.1em;text-transform:uppercase;opacity:.5;margin-bottom:7px}
.stat-card .val{font-size:20px;color:var(--bright)}
.stat-card .sub{font-size:10px;opacity:.4;margin-top:3px}
.photo-section-label{font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:#888;border-top:1px solid #ddd;padding-top:6px;margin-bottom:0;text-align:center}
</style>
</head>
<body>
<header>
  <h1>Size Comparison Visualizer</h1>
  <span class="sub">Clinical Reference — Personal Use</span>
</header>
<nav class="tabs">
  <div class="tab active" onclick="switchTab('dev')">Developmental Chart</div>
  <div class="tab"        onclick="switchTab('grp')">Group Comparison</div>
</nav>

<div id="pane-dev" class="pane active">
  <div class="slider-row">
    <button class="state-btn" onclick="animSlider('dev-sl',0)">Soft</button>
    <input  type="range" id="dev-sl" min="0" max="100" value="100" oninput="cancelAnim('dev-sl');renderAll()">
    <button class="state-btn on" onclick="animSlider('dev-sl',100)">Erect</button>
    <div style="flex:1"></div>
    <button class="state-btn photo-btn" onclick="togglePhotos()">Photos</button>
  </div>
  <div class="chart-scroll"><div id="dev-chart"></div></div>
  <p class="chart-note">P50 erect length by developmental age (ages 7-20) alongside Brian. Girth estimated from age-adjusted ratios.</p>
  <div class="stats" id="dev-stats"></div>
</div>

<div id="pane-grp" class="pane">
  <div class="slider-row">
    <button class="state-btn" onclick="animSlider('grp-sl',0)">Soft</button>
    <input  type="range" id="grp-sl" min="0" max="100" value="100" oninput="cancelAnim('grp-sl');renderAll()">
    <button class="state-btn on" onclick="animSlider('grp-sl',100)">Erect</button>
    <div style="flex:1"></div>
    <button class="state-btn photo-btn" onclick="togglePhotos()">Photos</button>
  </div>
  <div class="chart-scroll"><div id="grp-chart"></div></div>
  <div class="stats" id="grp-stats"></div>
</div>

function typeColor(t){
  return {subject:'#c84040',host:'#c8a030',familiar:'#2e6db0',newer:'#2e8a58',dev:'#6080a0'}[t]||'#888';
}
function lerp(a,b,t){return a+(b-a)*t;}
function sliderT(id){var el=document.getElementById(id);return el?el.value/100:1;}
function sc(l,v,s){return '<div class="stat-card"><div class="lbl">'+l+'</div><div class="val">'+v+'</div><div class="sub">'+s+'</div></div>';}

function hashStr(s){
  var h=2166136261;
  for(var i=0;i<s.length;i++){h=(h^s.charCodeAt(i))>>>0;h=Math.imul(h,16777619)>>>0;}
  return h;
}
function seededRand(seed){
  var s=seed>>>0;
  return function(){s=((Math.imul(s,1664525)+1013904223)&0xffffffff)>>>0;return s/4294967295;};
}

function glansRatio(lenIn,id){
  var base=Math.max(0.90,Math.min(1.55, 1.696-lenIn*0.1327));
  if(!id||id==='brian'||id.startsWith('age_'))return base;
  var rng=seededRand(hashStr(id));rng();rng();
  return Math.max(0.80,Math.min(1.65, base+(rng()-0.5)*0.20));
}
function glansAspect(id){
  if(!id||id==='brian'||id.startsWith('age_'))return 1.0;
  var rng=seededRand(hashStr(id+'_asp'));rng();
  return 0.82+rng()*0.36;
}

var _cache={};
function loadImg(src){
  if(_cache[src] instanceof HTMLImageElement)return Promise.resolve(_cache[src]);
  if(_cache[src])return _cache[src];
  var p=new Promise(function(res,rej){
    var img=new Image();img.onload=function(){_cache[src]=img;res(img);};img.onerror=rej;img.src=src;
  });_cache[src]=p;return p;
}
var _imgs=null;
async function getImgs(){
  if(_imgs)return _imgs;
  var r=await Promise.all([loadImg(ASSET_HEAD),loadImg(ASSET_SHAFT_CAP),loadImg(ASSET_SHAFT)]);
  _imgs={head:r[0],shaftCap:r[1],shaft:r[2]};return _imgs;
}

function renderPenis(canvas,imgs,lenMm,girMm,gr,gav){
  var h=imgs.head,sc=imgs.shaftCap,sh=imgs.shaft;
  var px=PX_PER_MM,diam=girMm/Math.PI;
  var lenPx=lenMm*px, shW=diam*px;
  var hW=shW*gr;
  var hH=Math.max(hW*(h.height/h.width)*gr*gav, lenPx*0.20);
  var capH=shW*(sc.height/sc.width);
  var hOverlap=Math.ceil(hH*0.6);
  var hBot=hH-hOverlap, capBot=hBot+capH-1;
  var shBodyH=Math.max(0,lenPx-capBot);
  canvas.width =Math.ceil(Math.max(shW,hW))||1;
  canvas.height=Math.ceil(Math.max(lenPx,capBot))||1;
  var ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  var xS=(canvas.width-shW)/2, xH=(canvas.width-hW)/2;
  if(shBodyH>0) ctx.drawImage(sh,0,0,sh.width,sh.height, xS,capBot,shW,shBodyH);
  ctx.drawImage(sc,0,0,sc.width,sc.height, xS,hBot,shW,capH);
  ctx.drawImage(h, 0,0,h.width, h.height,  xH,0,   hW, hH);
}

function togglePhotos(){
  showPhotos=!showPhotos;
  document.querySelectorAll('.photo-btn').forEach(function(b){
    b.classList.toggle('on',showPhotos);
    b.textContent=showPhotos?'Photos On':'Photos';
  });
  renderAll();
}

var _gen=0;
async function buildChart(cid,entries,gen,t){
  var imgs=await getImgs();
  if(gen!==_gen)return;

  var COL_W=108, RW=52, PAD_T=24, LBL_H=52;
  var maxMm=0;
  for(var i=0;i<entries.length;i++)if(entries[i].lenMm>maxMm)maxMm=entries[i].lenMm;
  var caH=Math.ceil(maxMm*PX_PER_MM)+PAD_T;
  var chartH=caH+LBL_H;
  var totH=chartH+(showPhotos?PHOTO_H:0);
  var totW=RW+entries.length*COL_W+12;
  var maxIn=Math.ceil(maxMm/IN2MM)+1;

  // Find Brian's column index for highlight
  var brianIdx=-1;
  for(var k=0;k<entries.length;k++){if(entries[k].isBrian){brianIdx=k;break;}}

  // Ruler SVG
  var rp='';
  // Subtle highlight behind Brian's column
  if(brianIdx>=0){
    var bColX=RW+brianIdx*COL_W;
    rp+='<rect x="'+bColX+'" y="0" width="'+COL_W+'" height="'+caH+'" fill="rgba(200,64,64,0.06)"/>';
  }
  rp+='<line x1="'+(RW-1)+'" y1="'+PAD_T+'" x2="'+(RW-1)+'" y2="'+caH+'" stroke="#ccc" stroke-width="1.5"/>';
  rp+='<line x1="'+(RW-1)+'" y1="'+caH+'" x2="'+totW+'" y2="'+caH+'" stroke="#bbb" stroke-width="2"/>';
  for(var inch=0;inch<=maxIn;inch++){
    var y=caH-inch*PX_PER_MM*IN2MM;
    if(y<0)break;
    rp+='<line x1="'+(RW-11)+'" y1="'+y+'" x2="'+(RW-1)+'" y2="'+y+'" stroke="#999" stroke-width="1.5"/>';
    rp+='<text x="'+(RW-15)+'" y="'+(y+4)+'" text-anchor="end" fill="#777" font-size="10" font-family="monospace">'+inch+'"</text>';
    rp+='<line x1="'+RW+'" y1="'+y+'" x2="'+totW+'" y2="'+y+'" stroke="rgba(0,0,0,.06)" stroke-width="1"/>';
    if(inch<maxIn){
      var hy=caH-(inch+0.5)*PX_PER_MM*IN2MM;
      if(hy>=0)rp+='<line x1="'+(RW-7)+'" y1="'+hy+'" x2="'+(RW-1)+'" y2="'+hy+'" stroke="#ccc" stroke-width="1"/>';
    }
  }

  var ctr=document.getElementById(cid);ctr.innerHTML='';
  var wrap=document.createElement('div');
  wrap.style.cssText='position:relative;width:'+totW+'px;height:'+totH+'px;background:white;display:inline-block;';

  var svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width',totW);svg.setAttribute('height',chartH);
  svg.style.cssText='position:absolute;top:0;left:0;pointer-events:none;';
  svg.innerHTML=rp;
  wrap.appendChild(svg);

  var cRow=document.createElement('div');
  cRow.style.cssText='position:absolute;top:0;left:'+RW+'px;display:flex;align-items:flex-end;'+
    'width:'+(totW-RW)+'px;height:'+caH+'px;overflow:visible;';

  var lRow=document.createElement('div');
  lRow.style.cssText='position:absolute;top:'+caH+'px;left:'+RW+'px;display:flex;'+
    'width:'+(totW-RW)+'px;height:'+LBL_H+'px;';

  for(var j=0;j<entries.length;j++){
    var e=entries[j];
    var lIn=(e.lenMm/IN2MM).toFixed(2);
    var gIn=(e.girMm/IN2MM).toFixed(2);
    var gr=glansRatio(e.lenMm/IN2MM,e.id);
    var gav=glansAspect(e.id);

    var cell=document.createElement('div');
    cell.style.cssText='width:'+COL_W+'px;flex-shrink:0;display:flex;justify-content:center;align-items:flex-end;height:100%;';
    var cv=document.createElement('canvas');
    renderPenis(cv,imgs,e.lenMm,e.girMm,gr,gav);
    cell.appendChild(cv);
    cRow.appendChild(cell);

    var lc=document.createElement('div');
    lc.style.cssText='width:'+COL_W+'px;flex-shrink:0;text-align:center;padding-top:6px;';
    var ns='color:'+typeColor(e.type)+(e.isBrian?';border-bottom:1px dashed #c84040':'');

    if(e.isBrian){
      lc.innerHTML=
        '<span style="display:block;color:#c84040;font-size:9px;margin-bottom:2px;">&#9660;</span>'+
        '<span class="p-name" style="'+ns+'">'+e.name+'</span>'+
        '<span class="p-meas">'+lIn+'" x '+gIn+'"</span>';
    } else {
      lc.innerHTML=
        '<span class="p-name" style="'+ns+'">'+e.name+'</span>'+
        '<span class="p-meas">'+lIn+'" x '+gIn+'"</span>';
    }
    lRow.appendChild(lc);
  }
  wrap.appendChild(cRow);
  wrap.appendChild(lRow);

  // Photo row (only when toggled on)
  if(showPhotos){
    var photoRow=document.createElement('div');
    photoRow.style.cssText='position:absolute;top:'+chartH+'px;left:'+RW+'px;display:flex;'+
      'width:'+(totW-RW)+'px;height:'+PHOTO_H+'px;border-top:1px solid #e8e8e8;padding-top:4px;';

    for(var j2=0;j2<entries.length;j2++){
      var e2=entries[j2];
      var pc=document.createElement('div');
      pc.style.cssText='width:'+COL_W+'px;flex-shrink:0;padding:0 3px;display:flex;flex-direction:column;align-items:center;';

      if(e2.isBrian){
        var bSrc=t>0.5?PHOTO_BRIAN_ERECT:PHOTO_BRIAN_SOFT;
        if(bSrc){
          var bImg=document.createElement('img');
          bImg.src=bSrc;
          bImg.style.cssText='max-width:100%;max-height:'+(PHOTO_H-14)+'px;object-fit:contain;border:1px solid rgba(200,64,64,0.5);display:block;';
          bImg.title='Brian — '+(t>0.5?'erect':'soft')+' reference';
          pc.appendChild(bImg);
          var bCap=document.createElement('div');
          bCap.style.cssText='font-size:7.5px;color:#c84040;letter-spacing:.07em;text-transform:uppercase;margin-top:3px;';
          bCap.textContent=t>0.5?'erect ref':'soft ref';
          pc.appendChild(bCap);
        } else {
          pc.innerHTML='<div style="width:100%;height:'+(PHOTO_H-14)+'px;border:1px dashed #c84040;display:flex;align-items:center;justify-content:center;color:#c84040;font-size:8px;letter-spacing:.06em;text-transform:uppercase;text-align:center;flex-direction:column;gap:4px;">'+
            '<span style="font-size:14px;">&#128247;</span><span>Photo<br>pending</span></div>'+
            '<div style="font-size:7px;color:#c84040;margin-top:3px;">save to viz-assets/brian-'+(t>0.5?'erect':'soft')+'.jpg</div>';
        }
      } else if(!e2.id.startsWith('age_')){
        // Dad placeholder — will be filled when dads provide photos
        pc.innerHTML='<div style="width:100%;height:'+(PHOTO_H-14)+'px;border:1px dashed #d0d0d0;display:flex;align-items:center;justify-content:center;color:#ccc;font-size:8px;text-align:center;">reference<br>pending</div>';
      }
      photoRow.appendChild(pc);
    }
    wrap.appendChild(photoRow);
  }

  ctr.appendChild(wrap);
}

async function renderGroup(gen){
  var t=sliderT('grp-sl');
  var sorted=PEOPLE.slice().sort(function(a,b){return a.le-b.le;});
  var entries=sorted.map(function(p){
    return{id:p.id,name:p.name,lenMm:lerp(p.ls,p.le,t)*IN2MM,girMm:lerp(p.gs,p.ge,t)*IN2MM,type:p.type,isBrian:p.id==='brian'};
  });
  await buildChart('grp-chart',entries,gen,t);
  if(gen===_gen)renderGroupStats(t);
}

function renderGroupStats(t){
  var brian=PEOPLE.filter(function(p){return p.id==='brian';})[0];
  var dads=PEOPLE.filter(function(p){return p.id!=='brian';});
  var bL=lerp(brian.ls,brian.le,t),bG=lerp(brian.gs,brian.ge,t);
  var avgL=dads.reduce(function(a,d){return a+lerp(d.ls,d.le,t);},0)/dads.length;
  var avgG=dads.reduce(function(a,d){return a+lerp(d.gs,d.ge,t);},0)/dads.length;
  var st=t>.5?'Erect':'Soft';
  document.getElementById('grp-stats').innerHTML=[
    sc('Brian - '+st+' Length',bL.toFixed(2)+'"','Dad avg: '+avgL.toFixed(2)+'"'),
    sc('Length Gap (avg)','-'+(avgL-bL).toFixed(2)+'"',((avgL-bL)/avgL*100).toFixed(0)+'% shorter'),
    sc('Brian - '+st+' Girth',bG.toFixed(2)+'"','Dad avg: '+avgG.toFixed(2)+'"'),
    sc('Girth Gap (avg)','-'+(avgG-bG).toFixed(2)+'"',((avgG-bG)/avgG*100).toFixed(0)+'% narrower'),
  ].join('');
}

async function renderDev(gen){
  var t=sliderT('dev-sl');
  var brian=PEOPLE.filter(function(p){return p.id==='brian';})[0];
  var bL=lerp(brian.ls,brian.le,t),bG=lerp(brian.gs,brian.ge,t);
  var devE=DEV.map(function(d){
    var erL=d.p50,erG=d.p50*d.gs_ratio;
    var sfL=d.p50*0.57,sfG=d.p50*d.gs_ratio*0.63;
    return{id:'age_'+d.age,name:'Age '+d.age,lenMm:lerp(sfL,erL,t)*IN2MM,girMm:lerp(sfG,erG,t)*IN2MM,type:'dev',isBrian:false};
  });
  var brE={id:'brian',name:'Brian',lenMm:bL*IN2MM,girMm:bG*IN2MM,type:'subject',isBrian:true};
  var all=devE.concat([brE]).sort(function(a,b){return a.lenMm-b.lenMm;});
  await buildChart('dev-chart',all,gen,t);
  if(gen===_gen)renderDevStats(t);
}

function renderDevStats(t){
  var brian=PEOPLE.filter(function(p){return p.id==='brian';})[0];
  var bL=lerp(brian.ls,brian.le,t),bG=lerp(brian.gs,brian.ge,t);
  var adult=DEV[DEV.length-1];
  var st=t>.5?'Erect':'Soft';
  var eqAge=null;
  for(var i=0;i<DEV.length-1;i++){
    if(bL>=DEV[i].p50&&bL<=DEV[i+1].p50){
      eqAge=DEV[i].age+(bL-DEV[i].p50)/(DEV[i+1].p50-DEV[i].p50)*(DEV[i+1].age-DEV[i].age);break;
    }
  }
  if(bL<DEV[0].p50)eqAge=DEV[0].age;
  document.getElementById('dev-stats').innerHTML=[
    sc('Brian - '+st+' Length',bL.toFixed(2)+'"','Adult P50: '+adult.p50.toFixed(2)+'"'),
    sc('vs Adult P50',((bL/adult.p50)*100).toFixed(0)+'%',(adult.p50-bL).toFixed(2)+'" shorter'),
    sc('Dev. Equivalent',eqAge?'~Age '+eqAge.toFixed(0):'Below age 7','P50 reference'),
    sc('Brian - '+st+' Girth',bG.toFixed(2)+'"','Est. adult avg: '+(adult.p50*adult.gs_ratio).toFixed(2)+'"'),
  ].join('');
}

var _anim={};
function cancelAnim(id){if(_anim[id]){cancelAnimationFrame(_anim[id]);_anim[id]=null;}}
function animSlider(id,target){
  var el=document.getElementById(id);if(!el)return;
  cancelAnim(id);
  var start=+el.value,diff=target-start,t0=performance.now(),dur=550;
  (function step(now){
    var p=Math.min((now-t0)/dur,1),e=1-Math.pow(1-p,3);
    el.value=Math.round(start+diff*e);renderAll();
    if(p<1)_anim[id]=requestAnimationFrame(step);
  })(t0);
}

function switchTab(name){
  ['dev','grp'].forEach(function(n){
    document.getElementById('pane-'+n).classList.toggle('active',n===name);
    document.querySelectorAll('.tab')[n==='dev'?0:1].classList.toggle('active',n===name);
  });
  renderAll();
}

function renderAll(){var gen=++_gen;renderGroup(gen);renderDev(gen);}
window.addEventListener('load',function(){renderAll();});
</script>
